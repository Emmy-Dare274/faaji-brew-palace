{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row">
        <div class="col-12 text-center">
            <h1 class="display-4">Welcome to Faaji & Brew Palace</h1>
            <p class="lead">West African Fine Dining</p>
            {% if user.is_authenticated %}
            <a href="/bookings/make-booking/" class="btn btn-primary btn-lg mt-3">Book a Table</a>
            {% else %}
            <a href="{% url 'account_signup' %}" class="btn btn-primary btn-lg mt-3">Register to Book</a>
            <a href="{% url 'account_login' %}" class="btn btn-outline-primary btn-lg mt-3 ms-2">Login</a>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
