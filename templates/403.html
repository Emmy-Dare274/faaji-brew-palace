{% extends "base.html" %}
{% load static %}

{% block content %}

<!-- 403 Forbidden error page -->
<section class="error-page py-5 text-center"
         aria-labelledby="error-heading">
    <div class="container py-5">

        <p class="error-code-label">403</p>
        <h1 id="error-heading" class="error-page-heading mb-3">
            Access Forbidden
        </h1>
        <p class="error-page-text mx-auto mb-5">
            You do not have permission to view or edit this booking.
            If you believe this is a mistake, please contact us at
            reservations@faajibrew.com.
        </p>
        <a href="{% url 'about:index' %}" class="btn btn-gold btn-lg">
            Back to Home
        </a>

    </div>
</section>

{% endblock %}
