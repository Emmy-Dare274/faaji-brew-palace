{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block content %}
<!-- Registration page for new users -->
<section class="auth-section py-5" aria-labelledby="signup-heading">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-7 col-lg-5">

                <div class="card auth-card shadow-sm border-0">
                    <div class="card-body p-4 p-md-5">

                        <h1 id="signup-heading" class="auth-heading text-center mb-1">
                            Reserve Your Place
                        </h1>
                        <p class="text-center text-muted mb-3">
                            Create an account to start booking your table at Faaji &amp; Brew Palace
                        </p>

                        <!-- Link to login for returning users -->
                        <p class="text-center small mb-4">
                            Already have an account?
                            <a href="{% url 'account_login' %}" class="auth-link">Sign in here</a>
                        </p>

                        <!-- novalidate lets Django handle all validation messaging -->
                        <form method="post" novalidate>
                            {% csrf_token %}
                            {{ form|crispy }}
                            <div class="d-grid mt-4">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    Create Account
                                </button>
                            </div>
                        </form>

                    </div>
                </div>

            </div>
        </div>
    </div>
</section>
{% endblock %}
