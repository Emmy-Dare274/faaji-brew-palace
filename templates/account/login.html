{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block content %}
<!-- Login page for returning users -->
<section class="auth-section py-5" aria-labelledby="login-heading">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-7 col-lg-5">

                <div class="card auth-card shadow-sm border-0">
                    <div class="card-body p-4 p-md-5">

                        <h1 id="login-heading" class="auth-heading text-center mb-1">
                            Welcome Back
                        </h1>
                        <p class="text-center text-muted mb-4">
                            Sign in to view and manage your reservations
                        </p>

                        <!-- novalidate lets Django handle all validation messaging -->
                        <form method="post" novalidate>
                            {% csrf_token %}
                            {{ form|crispy }}
                            <div class="d-grid mt-4">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    Sign In
                                </button>
                            </div>
                        </form>

                        <hr class="my-4">

                        <!-- Registration link for new visitors -->
                        <p class="text-center mb-0">
                            New to Faaji &amp; Brew Palace?
                            <a href="{% url 'account_signup' %}" class="auth-link">
                                Create a free account
                            </a>
                        </p>

                    </div>
                </div>

            </div>
        </div>
    </div>
</section>
{% endblock %}
