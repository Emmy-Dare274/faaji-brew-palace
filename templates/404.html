{% extends "base.html" %}
{% load static %}

{% block content %}

<!-- 404 Not Found error page -->
<section class="error-page py-5 text-center"
         aria-labelledby="error-heading">
    <div class="container py-5">

        <p class="error-code-label">404</p>
        <h1 id="error-heading" class="error-page-heading mb-3">
            Page Not Found
        </h1>
        <p class="error-page-text mx-auto mb-5">
            The page you are looking for has moved or does not exist.
            Head back home and explore from there.
        </p>
        <a href="{% url 'about:index' %}" class="btn btn-gold btn-lg me-2">
            Back to Home
        </a>
        <a href="{% url 'bookings:make_booking' %}" class="btn btn-hero-outline btn-lg">
            Book a Table
        </a>

    </div>
</section>

{% endblock %}
